# Mopidy configuration for RPi Zero 2 W music server
# Copy to /etc/mopidy/mopidy.conf
# Docs: https://docs.mopidy.com/en/latest/config/

[core]
cache_dir = /var/cache/mopidy
config_dir = /etc/mopidy
data_dir = /var/lib/mopidy

[logging]
verbosity = 0

[softwaremixer]
# Default volume on startup (0-100)
volume = 50

[audio]
# Route audio through BlueALSA to the C50BT Bluetooth speaker
# "btspeaker" is a named PCM defined in /etc/asound.conf
# queue2 adds a 5MB buffer between the network stream and audio output,
# so WiFi latency spikes don't starve playback on the Pi Zero 2 W
output = queue2 max-size-bytes=5242880 max-size-time=0 max-size-buffers=0 ! alsasink device=btspeaker

[http]
# Bind to all interfaces so the Iris web UI is accessible from LAN
hostname = 0.0.0.0
port = 6680

[bandcamp]
# Browse and play Bandcamp tracks via Mopidy-Bandcamp
# Free streams play at 128kbps
# For access to your purchased collection at higher quality (mp3-v0),
# grab your identity cookie from your browser:
#   1. Log in to bandcamp.com
#   2. Open DevTools > Application > Cookies > bandcamp.com
#   3. Copy the value of the "identity" cookie
#   4. Paste it below (uncomment the line)
# identity = YOUR_BANDCAMP_IDENTITY_COOKIE_HERE
discover_tags = christian metal, christian black metal
discover_genres = classical, prog rock
discover_pages = 1
collection_items = 50
image_sizes = 2

[file]
# Optionally serve local music files
# media_dirs = /home/pi/music
enabled = false

[iris]
country = US
locale = en_US_us
