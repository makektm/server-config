# Raspotify systemd service override
# Install with: sudo systemctl edit raspotify
# Or copy to: /etc/systemd/system/raspotify.service.d/override.conf
#
# Raspotify's default systemd sandboxing blocks Bluetooth sockets (AF_BLUETOOTH),
# which prevents it from talking to BlueALSA. This override adds AF_BLUETOOTH
# to the allowed socket families.

[Service]
RestrictAddressFamilies=AF_UNIX AF_INET AF_INET6 AF_NETLINK AF_BLUETOOTH
