# Raspotify configuration for RPi Zero 2 W
# Copy to /etc/raspotify/conf
# Docs: https://github.com/dtcooper/raspotify

# Device name shown in Spotify Connect device list
LIBRESPOT_NAME="MakeKTM Pi"

# Audio backend — ALSA with BlueALSA for Bluetooth output to C50BT
LIBRESPOT_BACKEND="alsa"

# ALSA device — "btspeaker" PCM defined in /etc/asound.conf
LIBRESPOT_DEVICE="btspeaker"

# Bitrate: 96, 160, or 320 (Premium required for 320)
LIBRESPOT_BITRATE="320"

# Audio format
LIBRESPOT_FORMAT="S16"

# Initial volume (0-100)
LIBRESPOT_INITIAL_VOLUME="50"

# Enable volume normalisation
LIBRESPOT_VOLUME_CTRL="linear"
LIBRESPOT_NORMALISATION=""

# Device type shown in Spotify app
LIBRESPOT_DEVICE_TYPE="speaker"

# Cache for downloaded tracks (reduces network usage on replays)
LIBRESPOT_CACHE="/var/cache/raspotify"
