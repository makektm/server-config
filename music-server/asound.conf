# BlueALSA ALSA configuration for C50BT Bluetooth speaker
# Copy to /etc/asound.conf
#
# IMPORTANT: Replace AE:EC:81:96:06:B7 with the actual MAC address of your C50BT.
# Find it with: bluetoothctl devices
#
# This file MUST be in /etc/asound.conf (not ~/.asoundrc) because
# Mopidy and Raspotify run as system services and won't read user configs.

# Default playback device → BlueALSA (C50BT)
defaults.bluealsa.device "AE:EC:81:96:06:B7"
defaults.bluealsa.profile "a2dp"

# Named PCM for the C50BT — referenced by Mopidy and Raspotify configs
pcm.btspeaker {
    type plug
    slave.pcm {
        type bluealsa
        device "AE:EC:81:96:06:B7"
        profile "a2dp"
    }
    hint {
        show on
        description "C50BT Bluetooth Speaker"
    }
}

ctl.btspeaker {
    type bluealsa
}

# Set system default to the Bluetooth speaker
pcm.!default {
    type plug
    slave.pcm "btspeaker"
}

ctl.!default {
    type bluealsa
}
